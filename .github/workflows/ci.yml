name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "notebooks/**"
      - "data/**"
      - "*.md"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "notebooks/**"
      - "data/**"
      - "*.md"
      - ".github/ISSUE_TEMPLATE/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default; each job grants only what it needs.
permissions: {}

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: requirements.txt
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv tool install ruff==0.15.12
      - run: ruff format --check src tests
      - run: ruff check src tests

  test:
    name: Tests & Coverage
    runs-on: ubuntu-24.04
    needs: lint
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    env:
      # Prevent import-time env-check crashes; real API tests must mock these
      GEMINI_MODEL: "gemini-2.5-flash-lite"
      GEMINI_API_KEY: "ci-placeholder"
      YELP_API_KEY: "ci-placeholder"
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: requirements.txt
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore venv from cache
        id: venv-cache
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}

      - name: Create venv
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: uv venv

      - run: echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Install Python dependencies
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: uv pip install -r requirements.txt pytest-cov pytest-timeout

      - name: Run tests
        run: |
          python -m pytest -v --tb=short \
            --timeout=60 \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=50 \
            --junitxml=/tmp/pytest-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: /tmp/pytest-results.xml
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

      - name: Write coverage to Job Summary
        if: always()
        run: |
          echo "## Test Coverage" >> "$GITHUB_STEP_SUMMARY"
          python -m coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || \
            echo "*(coverage data unavailable)*" >> "$GITHUB_STEP_SUMMARY"

      - name: Coverage diff comment on PR
        if: always()
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 75
          MINIMUM_ORANGE: 50
          COVERAGE_DATA_BRANCH: python-coverage-comment-action-data

  security:
    name: Security Scan
    runs-on: ubuntu-24.04
    needs: lint
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: requirements.txt
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv tool install bandit
      - run: uv tool install pip-audit
      - run: bandit -r src -ll -ii -f txt
      - run: pip-audit -r requirements.txt --progress-spinner=off --strict

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-24.04
    needs: lint
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  commit-lint:
    name: Conventional Commits
    runs-on: ubuntu-24.04
    needs: lint
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-action@v6
        with:
          configFile: .commitlintrc.yml
          failOnWarnings: false
          helpURL: "https://www.conventionalcommits.org/"

  # Single required status check for branch protection rules.
  # Set "ci-pass" as the only required check in branch settings.
  ci-pass:
    name: CI Pass
    runs-on: ubuntu-24.04
    needs: [lint, test, security]
    if: always()
    timeout-minutes: 1
    permissions: {}
    steps:
      - name: Verify all required jobs passed
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results" | python3 -c "
          import json, sys
          needs = json.load(sys.stdin)
          failed = [k for k, v in needs.items() if v['result'] not in ('success', 'skipped')]
          if failed:
              print('Failed jobs:', failed)
              sys.exit(1)
          print('All required checks passed')
          "
