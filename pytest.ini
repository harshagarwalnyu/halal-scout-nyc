[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
pythonpath = .
testpaths = tests
cache_dir = /tmp/pytest_cache
addopts = --strict-markers --strict-config
filterwarnings =
    error::FutureWarning
    ignore::FutureWarning:pandas
    ignore::FutureWarning:sklearn
    ignore::FutureWarning:lifelines
    ignore::DeprecationWarning:lifelines
    ignore::DeprecationWarning:sklearn
    ignore::UserWarning:xgboost
    ignore::UserWarning:pickle
