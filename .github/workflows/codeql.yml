name: CodeQL

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "notebooks/**"
      - "data/**"
      - "*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "notebooks/**"
      - "data/**"
      - "*.md"
  schedule:
    # Weekly scan on Monday at 06:00 UTC — catches new CVEs between PRs
    - cron: "0 6 * * 1"

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
